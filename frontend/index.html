<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>交大新生助手</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>交大新生助手</h1>

      <div id="serverStatus" class="server-status">正在检查后端连接...</div>

      <div class="card">
        <textarea
          id="message"
          placeholder="例如：新生入学前要准备什么？"
        ></textarea>
        <br />

        <input id="campus" placeholder="校区，例如：闵行校区" />
        <input id="college" placeholder="学院，例如：电子信息与电气工程学院" />
        <input id="major" placeholder="专业，例如：计算机科学与技术" />
        <input id="dormArea" placeholder="宿舍区域，例如：东区" />
        <button id="sendButton">发送</button>
        <button id="clearButton" type="button">清空对话</button>

        <div id="error" class="error"></div>
        <div id="chatLog" class="chat-log"></div>

        <section id="mapSection" class="map-section" hidden>
          <div class="map-header">校园路线地图</div>
          <div id="campusMap" class="campus-map"></div>
        </section>
      </div>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
