<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>交大新生助手</title>
    <style>
      body {
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f6f7fb;
        margin: 0;
        color: #222;
      }

      main {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }

      textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        font-size: 16px;
        box-sizing: border-box;
      }

      button {
        margin-top: 12px;
        padding: 10px 18px;
        font-size: 16px;
        cursor: pointer;
      }

      .card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
      }

      .answer {
        margin-top: 24px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .source {
        margin-top: 12px;
        padding: 12px;
        border: 1px solid #e5e5e5;
        background: #fafafa;
        border-radius: 6px;
      }

      .source-title {
        font-weight: bold;
      }

      .source-meta {
        color: #666;
        font-size: 14px;
        margin: 6px 0;
      }

      .error {
        color: #c00;
        margin-top: 12px;
      }

      .chat-log {
        margin-top: 24px;
      }

      .message {
        margin-bottom: 18px;
        padding: 14px;
        border-radius: 8px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .message.user {
        background: #e8f1ff;
        border: 1px solid #c9defc;
      }

      .message.assistant {
        background: #ffffff;
        border: 1px solid #e5e5e5;
      }

      .message-role {
        font-weight: bold;
        margin-bottom: 6px;
      }

      .sources {
        margin-top: 12px;
      }

      .source {
        margin-top: 8px;
        padding: 10px;
        border: 1px solid #e5e5e5;
        background: #fafafa;
        border-radius: 6px;
      }

      .source-title {
        font-weight: bold;
      }

      .source-meta {
        color: #666;
        font-size: 14px;
        margin: 4px 0;
      }

      .source-toggle {
        width: 100%;
        text-align: left;
        border: none;
        background: transparent;
        padding: 0;
        font-size: 14px;
        cursor: pointer;
        color: #333;
      }

      .source-content {
        margin-top: 8px;
        color: #444;
        line-height: 1.6;
      }
      .server-status {
        margin-bottom: 16px;
        font-size: 14px;
        color: #666;
      }

      .server-status.ok {
        color: #16803c;
      }

      .server-status.error {
        color: #c00;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>交大新生助手</h1>

      <div id="serverStatus" class="server-status">正在检查后端连接...</div>

      <div class="card">
        <textarea
          id="message"
          placeholder="例如：新生入学前要准备什么？"
        ></textarea>
        <br />

        <input id="campus" placeholder="校区，例如：闵行校区" />
        <input id="college" placeholder="学院，例如：电子信息与电气工程学院" />
        <input id="major" placeholder="专业，例如：计算机科学与技术" />
        <input id="dormArea" placeholder="宿舍区域，例如：东区" />
        <button id="sendButton">发送</button>
        <button id="clearButton" type="button">清空对话</button>

        <div id="error" class="error"></div>
        <div id="chatLog" class="chat-log"></div>
      </div>
    </main>

    <script>
      const STORAGE_KEY = "sjtu_freshman_chat_history";
      let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

      function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
      }

      const messageInput = document.getElementById("message");
      const sendButton = document.getElementById("sendButton");
      const chatLog = document.getElementById("chatLog");
      const errorBox = document.getElementById("error");
      const clearButton = document.getElementById("clearButton");
      const serverStatus = document.getElementById("serverStatus");
      //个人信息
      const profile = {
        campus: document.getElementById("campus").value.trim() || null,
        college: document.getElementById("college").value.trim() || null,
        major: document.getElementById("major").value.trim() || null,
        dorm_area: document.getElementById("dormArea").value.trim() || null,
        international_student: false,
      };
      //输出回答
      function appendMessage(role, content, sources = [], usedLlm = null) {
        const message = document.createElement("div");
        message.className = "message " + role;

        const roleBox = document.createElement("div");
        roleBox.className = "message-role";
        roleBox.textContent = role === "user" ? "你" : "新生助手";

        const contentBox = document.createElement("div");
        contentBox.textContent = content;

        message.appendChild(roleBox);
        message.appendChild(contentBox);

        if (role === "assistant") {
          const meta = document.createElement("div");
          meta.className = "source-meta";
          meta.textContent = usedLlm
            ? "已使用大模型生成回答"
            : "使用本地知识库回答";
          message.appendChild(meta);

          const sourcesBox = document.createElement("div");
          sourcesBox.className = "sources";

          if (sources.length > 0) {
            const title = document.createElement("div");
            title.className = "message-role";
            title.textContent = "参考来源";
            sourcesBox.appendChild(title);

            sources.forEach((source) => {
              const item = document.createElement("div");
              item.className = "source";

              const header = document.createElement("button");
              header.className = "source-toggle";
              header.type = "button";
              header.textContent = `▶ ${source.title} | ${source.source} | 相关度：${source.score}`;

              const content = document.createElement("div");
              content.className = "source-content";
              content.textContent = source.content;
              content.style.display = "none";

              header.addEventListener("click", () => {
                const isHidden = content.style.display === "none";
                content.style.display = isHidden ? "block" : "none";
                header.textContent = `${isHidden ? "▼" : "▶"} ${source.title} | ${source.source} | 相关度：${source.score}`;
              });

              item.appendChild(header);
              item.appendChild(content);
              sourcesBox.appendChild(item);
            });
          }

          message.appendChild(sourcesBox);
        }

        chatLog.appendChild(message);
        message.scrollIntoView({ behavior: "smooth", block: "end" });
      }
      //发送操作
      async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message) {
          errorBox.textContent = "请先输入问题。";
          return;
        }

        appendMessage("user", message);
        messageInput.value = "";

        sendButton.disabled = true;
        sendButton.textContent = "思考中...";
        errorBox.textContent = "";

        try {
          const response = await fetch("http://127.0.0.1:8000/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message: message,
              history: chatHistory,
              profile: profile,
            }),
          });

          if (!response.ok) {
            throw new Error("后端返回错误：" + response.status);
          }

          const data = await response.json();
          appendMessage(
            "assistant",
            data.answer,
            data.sources || [],
            data.used_llm,
          );

          chatHistory.push({
            role: "user",
            content: message,
          });

          chatHistory.push({
            role: "assistant",
            content: data.answer,
          });

          saveHistory();
        } catch (error) {
          errorBox.textContent = "请求失败：" + error.message;
        } finally {
          sendButton.disabled = false;
          sendButton.textContent = "发送";
          messageInput.focus();
        }
      }
      //检查后端连接
      async function checkServerStatus() {
        try {
          const response = await fetch("http://127.0.0.1:8000/health");

          if (!response.ok) {
            throw new Error("后端返回错误：" + response.status);
          }

          const data = await response.json();

          serverStatus.textContent = `后端已连接：${data.status}`;
          serverStatus.className = "server-status ok";
          sendButton.disabled = false;
        } catch (error) {
          serverStatus.textContent =
            "后端未连接，请先启动 uvicorn app.main:app --reload";
          serverStatus.className = "server-status error";
          sendButton.disabled = true;
        }
      }
      //每次刷新保留历史回答
      chatHistory.forEach((message) => {
        appendMessage(message.role, message.content);
      });

      sendButton.addEventListener("click", sendMessage);

      clearButton.addEventListener("click", () => {
        chatHistory = [];
        localStorage.removeItem(STORAGE_KEY);
        chatLog.innerHTML = "";
        errorBox.textContent = "";
      });
      //按键回车直接发送
      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      //检查服务器状态
      checkServerStatus();
    </script>
  </body>
</html>
